[defaults]
inventory = inventory.ini
host_key_checking = False
remote_user = ubuntu
#private_key_file = /home/ubuntu/ansible-docker-project/terra-automate-key.pem
vault_password_file = .vault_pass
become = true
become_method = sudo

[privilege_escalation]
become = true
become_method = sudo

[ssh_connection]
allow_world_readable_tmpfiles = true
