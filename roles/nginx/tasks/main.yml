---
# tasks file for roles/nginx

- name: Install Nginx
  apt:
    name: nginx
    state: present
  tags: nginx

- name: Remove Default Nginx Site config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload Nginx
  tags: nginx

    #- name: Deploy the Nginx config from template
    #template:
    #src: nginx.conf.j2
    #dest: /etc/nginx/nginx.conf
    #owner: root
    #group: root
    #mode: '0644'
      #    validate: nginx -t -c %s
      #notify: Reload Nginx
      # tags: nginx

- name: Deploy the reverse proxy config from template
  template:
    src: app-proxy.conf.j2
    dest: /etc/nginx/conf.d/{{ project_name }}.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload Nginx
  tags: nginx

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false
  tags: nginx

- name: Start and enable nginx
  service:
    name: nginx
    state: started
    enabled: true
  tags: nginx
