--

# Install Docker Dependencies
- name: Install Docker Dependency
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  tags: docker

# Add Docker CE repository
- name: Create /etc/apt/keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: docker

